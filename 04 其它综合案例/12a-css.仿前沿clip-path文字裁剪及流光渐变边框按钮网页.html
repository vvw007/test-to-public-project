<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿前沿导航clip-path文字裁剪及流光渐变边框按钮网页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e1f26;
    }

    a {
      text-decoration: none;
      color: #fff;
    }

    /* 渐变方式 1 */
    .btn1 {
      position: relative;
      display: block;
      padding: 3px;
      width: 140px;
      height: 60px;
      margin: 100px;
      border-radius: 6px;
      text-align: center;
      line-height: 54px;
      background-color: pink;
      overflow: hidden;
    }

    /* 定义动画 */

    @keyframes move {
      to {
        transform: translateX(-50%);
      }
    }

    .btn1::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 100%;
      top: 0;
      left: 0;
      /* background-color: #fff; */
      /* 添加线性渐变 */
      background: linear-gradient(115deg, #4fcf70, #fad648, #a767e5, #12bcfe, #44ce7b);
      background-size: 50% 100%;
      /* 开始动画 */
      animation: move 0.75s linear infinite;
      /* z-index: 1; */
    }

    .btn1 span {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #000;
      /* z-index: 1; */
    }

    /* 渐变方式 2 */
    .btn2 {
      position: relative;
      width: 300px;
      height: 200px;
      margin: 50px;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      color: #fff;
      line-height: 200px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    .btn2::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      /* background-color: #fff; */
      /* 添加线性渐变 */
      background-image: conic-gradient(transparent, transparent, transparent, #00ccff);
      /* 开始动画 */
      animation: rotate 2s linear infinite;
      z-index: -1;
    }

    .btn2::after {
      content: '';
      position: absolute;
      inset: 3px;
      background-color: #000;
      border-radius: 10px;
      z-index: -1;
    }
  </style>
</head>

<body>
  <!-- 渐变方式 1 -->
  <a href="#" class="btn1">
    <span>开始按钮</span>
  </a>
  <!-- 渐变方式 2 -->
  <div class="btn2">渐变边框 </div>
</body>

</html>
