<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悬停相册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .body {
      background-color: #1a252c;
    }

    .box {
      margin: 200px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box .item {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 2px;
      cursor: pointer;
      /* 添加倒影 */
      -webkit-box-reflect: below 1px linear-gradient(transparent, transparent, #0002);
      transition: all 0.3s ease-in-out;
    }

    .item img {
      width: 100%;
      height: 100%;
      border-radius: 5px;
    }

    /* 核心代码 */
    /* 鼠标经过某个盒子，当前盒子变大 */
    .box .item:hover {
      transform: scale(1.2);
      z-index: 1;
    }

    /* 鼠标经过某个盒子，其他盒子都变小，当前盒子保持不变 */
    .box:hover .item:not(:hover) {
      transform: perspective(100px) scale(0.8) rotateY(45deg);
      /* 滤镜模糊 */
      filter: blur(2px)
    }

    /* 鼠标经过的盒子，后面的兄弟姐妹修改下变形 */
    .box .item:hover~.item {
      transform: perspective(100px) scale(0.8) rotateY(-45deg);
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="item"><img src="img/1.png" alt=""></div>
    <div class="item"><img src="img/2.png" alt=""></div>
    <div class="item"><img src="img/3.png" alt=""></div>
    <div class="item"><img src="img/4.png" alt=""></div>
    <div class="item"><img src="img/5.png" alt=""></div>
  </div>
</body>

</html>
