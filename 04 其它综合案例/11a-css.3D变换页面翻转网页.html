<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿前沿导航两面翻转的图片网页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .box {
      width: 300px;
      height: 400px;
      margin: 100px auto;
      position: relative;
      border: 1px solid #f158b7;
      /* 透视效果的实现需要在父元素上设置 perspective 属性 */
      perspective: 500px;
    }

    .box>div {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      font-size: 30px;
      text-align: center;
      line-height: 400px;
      transition: all 1s;
      /* 转到后面要隐藏盒子 */
      backface-visibility: hidden;
    }

    .front {
      z-index: 1;
    }

    .back {
      transform: rotateY(180deg);
    }

    .box div img {
      width: 100%;
      height: 100%;
    }

    .box div h2 {
      font-size: 30px;
      height: 40px;
      line-height: 40px;
      color: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .box:hover .front {
      transform: rotateY(-180deg);
    }

    .box:hover .back {
      transform: rotateY(0deg);
    }
  </style>
</head>


<body>
  <div class="box">
    <div class="front">
      <img src="./img/ldhx.png" alt="">
      <H2>恭喜你发财 </H2>
    </div>
    <div class="back">
      <img src="./img/ldhy.jpg" alt="">
      <H2>给我一杯忘情水 </H2>
    </div>
  </div>
</body>

</html>
