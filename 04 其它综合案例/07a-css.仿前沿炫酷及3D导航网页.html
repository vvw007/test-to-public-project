<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿前沿导航炫酷导航栏及3D导航</title>
  <link rel="stylesheet" href="http://at.alicdn.com/t/c/font_4096975_pswyqyk8tdo.css">
  <style>
    /* 1.去除默认样式 设置底色 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ccc;
    }

    /* 2.准备导航的基本样式 */
    ul {
      list-style: none;
      display: flex;
      gap: 5px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 3.1 准备导航里面图标的基本样式 */
    ul li {
      position: relative;
      width: 80px;
      height: 40px;
      /* 开启子元素的3d空间 */
      transform-style: preserve-3d;
      /* 准备3d导航的旋转角度 */
      transition: all 0.5s;
    }

    ul li span {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      width: 100%;
      height: 100%;
      line-height: 40px;
      text-align: center;
      font-size: 16px;
      background-color: #fff;
      color: #262626;
      text-align: center;
    }

    ul li span.front {
      background-color: #fff;
      color: #3b5999;
      transform: translateZ(20px);
    }

    ul li span.bottom {
      background-color: #3b5999;
      color: #fff;
      transform: translateY(20px) rotateX(-90deg);
    }

    /* 3.2 准备导航的旋转效果 */
    ul li:hover {
      transform: rotateX(90deg);
    }
  </style>
</head>

<body>
  <ul>
    <li>
      <span class="front iconfont icon-QQ"></span>
      <span class="bottom iconfont icon-QQ"></span>
    </li>
    <li>
      <span class="front iconfont icon-weixin"></span>
      <span class="bottom iconfont icon-weixin"></span>
    </li>
    <li>
      <span class="front iconfont icon-douyin"></span>
      <span class="bottom iconfont icon-douyin"></span>
    </li>
    <li>
      <span class="front iconfont icon-xinlangweibo"></span>
      <span class="bottom iconfont icon-xinlangweibo"></span>
    </li>
  </ul>
</body>

</html>
