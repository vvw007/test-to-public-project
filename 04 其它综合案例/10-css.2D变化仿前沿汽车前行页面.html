<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D变化-仿前沿汽车前行网页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .box {
      width: 1000px;
      height: 400px;
      border: 1px solid #b1d51e;
      margin: 100px auto;
      position: relative;
      background-color: grey;
    }

    .car {
      width: 400px;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      position: absolute;
      transition: all 3s cubic-bezier(0.65, 0.05, 0.36, 1);
    }

    .car .car-img {
      width: 100%;
    }

    .car .lt-l,
    .car .lt-r {
      width: 53px;
      top: 75px;
      right: 76px;
      position: absolute;
      transition: all 3s cubic-bezier(0.65, 0.05, 0.36, 1);
    }

    .car .lt-l {
      position: absolute;
      top: 75px;
      right: 289px;
    }

    .box .car:hover {
      transform: translate(-600px, -50%);
    }

    .box .car:hover .lt-l,
    .box .car:hover .lt-r {
      transform: rotate(-360deg);
    }

    /* .box:hover img {
      transform: translateX(-900px) rotate(360deg);
    } */
  </style>
</head>

<body>
  <div class="box">
    <div class="car">
      <img src="./img/car.webp" alt="" class="car-img">
      <img src="./img/wj.webp" alt="" class="lt-l">
      <img src="./img/wj.webp" alt="" class="lt-r">

    </div>
  </div>
</body>

</html>
