<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿360官网页面动画效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }


    body {
      background: url(./img/bg.jpg) no-repeat center center/cover #000;
    }

    .ball1 {
      position: absolute;
      top: 22%;
      left: 20%;
      width: 13%;
      animation: move 5s linear 0s alternate infinite;
    }

    .ball2 {
      position: absolute;
      top: 50%;
      left: 65%;
      width: 22%;
      animation: move 6s linear 0s alternate infinite;
    }

    .wx {
      position: absolute;
      top: 50%;
      left: 65%;
      width: 8%;
      animation: rotate 30s linear 0s alternate infinite;
    }

    @keyframes move {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-25px);
      }
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(-45deg);
      }
    }
  </style>
</head>

<body>
  <img src="./img/ball1.png" alt="" class="ball1">
  <img src="./img/ball2.png" alt="" class="ball2">
  <img src="./img/wx.png" alt="" class="wx">
</body>

</html>
