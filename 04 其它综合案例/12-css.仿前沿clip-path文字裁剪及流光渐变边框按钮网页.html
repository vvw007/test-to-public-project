<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿前沿导航clip-path文字裁剪及流光渐变边框按钮网页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #222222;
    }

    h1 {
      color: #292929;
      /* font-size: 15vw; */
      font-size: 200px;
      position: relative;
      /* display: inline-block;
      width: 80vw;
      margin: 100px auto; */
    }

    h1::before {
      content: 'HOLLOWORLD';
      position: absolute;
      top: 0;
      left: 0;
      /** 透明颜色 */
      color: transparent;
      background: linear-gradient(to right, #ff69b3, #fe0000, #ffa401, #ffff01, #008102, #40e1d2, #410898, #9400d4);
      /** 以文字范围裁剪背景图片 讲解背景的时候讲过 */
      background-clip: text;
      /* 裁剪 clip path */
      -webkit-clip-path: circle(100px at 100% 50%);
      animation: move 5s linear forwards infinite;
      /* display: inline-block;
      width: 80vw; */
    }

    @keyframes move {
      0% {
        -webkit-clip-path: circle(100px at 0% 50%);
      }

      50% {
        -webkit-clip-path: circle(100px at 100% 50%);
      }

      100% {
        -webkit-clip-path: circle(100px at 0% 50%);
      }
    }
  </style>
</head>

<body>
  <h1>HOLLOWORLD</h1>
</body>

</html>
