<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面滚动事件</title>
  <style>
    body {
      padding-top: 100px;
      height: 3000px;
    }

    div {
      display: none;
      margin: 100px;
      overflow: scroll;
      width: 200px;
      height: 200px;
      border: 1px solid #000;
    }
  </style>
</head>

<body>
  <div>
    p这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字
    这里有很多文字

  </div>
  <script>
    // 页面滚动事件
    window.addEventListener('scroll', function () {
      console.log('页面滚动了')
      //我想知道页面到底滚动了多少像素，被卷去了多少 scrollTop
      // 获取html元素写法
      // document.documentElement.scrollTop
      console.log(document.documentElement.scrollTop)
      const n = document.documentElement.scrollTop
      if (n > 100) {
        console.log('页面滚动了100px')
        div.style.display = 'block'
      }
      else {
        div.style.display = 'none'
      }
    })
    const div = document.querySelector('div')
    // 监听div的滚动事件
    div.addEventListener('scroll', function () {
      // 滚动事件触发时，div的滚动距离
      // scrollTop 被卷去的头部
      console.log(div.scrollTop)

    })
  </script>
</body>

</html>
